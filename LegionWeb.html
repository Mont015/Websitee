<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Legion Roblox</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap');

* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}
body {
  background:#050508;
  color:white;
  overflow:hidden;
}
#bgCanvas {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
}
nav {
  position:fixed;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:20px 50px;
  background:rgba(10,10,20,0.6);
  backdrop-filter:blur(10px);
}
nav h1 {
  background:linear-gradient(90deg,#7a5cff,#00d4ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
nav a {
  margin-left:25px;
  color:#aaa;
  text-decoration:none;
}
nav a:hover { color:white; }
.hero {
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}
.hero h2 {
  font-size:4rem;
  background:linear-gradient(90deg,#7a5cff,#00d4ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.hero p {
  margin-top:20px;
  color:#aaa;
  font-size:1.3rem;
}
@media(max-width:768px){
  .hero h2 { font-size:2.5rem; }
}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<nav>
  <h1>Legion</h1>
  <div>
    <a href="https://discord.gg/fvbJNKzQAT" target="_blank">Discord</a>
    <a href="https://raw.githubusercontent.com/Mont015/Websitee/refs/heads/main/GetScript.html">Script</a>
    <a href="https://raw.githubusercontent.com/Mont015/Websitee/refs/heads/main/GetKeyWeb.html">Get Key</a>
  </div>
</nav>
<section class="hero">
  <h2>Legion Roblox</h2>
  <p>Roblox but on steroids.</p>
</section>
<script>
const canvas = document.getElementById("bgCanvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
let particles = [];
window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
class Particle {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 2 + 1;
    this.speedX = (Math.random() - 0.5) * 0.5;
    this.speedY = (Math.random() - 0.5) * 0.5;
  }
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
    if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
  }
  draw() {
    ctx.fillStyle = "rgba(122,92,255,0.7)";
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}
function init() {
  particles = [];
  for (let i = 0; i < 100; i++) {
    particles.push(new Particle());
  }
}
function connect() {
  for (let a = 0; a < particles.length; a++) {
    for (let b = a; b < particles.length; b++) {
      let dx = particles[a].x - particles[b].x;
      let dy = particles[a].y - particles[b].y;
      let dist = dx * dx + dy * dy;
      if (dist < 9000) {
        ctx.strokeStyle = "rgba(0,212,255,0.06)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(particles[a].x, particles[a].y);
        ctx.lineTo(particles[b].x, particles[b].y);
        ctx.stroke();
      }
    }
  }
}
function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let p of particles) {
    p.update();
    p.draw();
  }
  connect();
  requestAnimationFrame(animate);
}
init();
animate();
</script>
</body>
</html>

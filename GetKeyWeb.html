<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Legion - Get Key</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap');

* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body {
  background:#050508;
  color:white;
  overflow:hidden;
}

#bgCanvas {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
}

nav {
  position:fixed;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:20px 50px;
  background:rgba(10,10,20,0.6);
  backdrop-filter:blur(10px);
}

nav h1 {
  background:linear-gradient(90deg,#7a5cff,#00d4ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

nav a {
  margin-left:25px;
  color:#aaa;
  text-decoration:none;
}

nav a:hover { color:white; }

.hero {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* CARD */
.card {
  background:rgba(20,20,30,0.6);
  padding:40px;
  border-radius:16px;
  backdrop-filter:blur(12px);
  text-align:center;
  width:420px;
}

.card h2 {
  font-size:2rem;
  background:linear-gradient(90deg,#7a5cff,#00d4ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.card p {
  margin-top:10px;
  color:#aaa;
}

/* OPTIONS */
.options {
  margin-top:25px;
  display:flex;
  gap:15px;
}

.option {
  flex:1;
  background:#0f0f18;
  border-radius:12px;
  padding:20px;
  cursor:pointer;
  transition:0.3s;
  text-decoration:none;
  color:white;
}

.option:hover {
  transform:translateY(-5px);
  background:#161622;
}

/* ICON */
.option img {
  width:40px;
  margin-bottom:10px;
}

.option span {
  display:block;
  font-weight:500;
}

@media(max-width:768px){
  .card { width:90%; }
  .options { flex-direction:column; }
}
</style>
</head>

<body>

<canvas id="bgCanvas"></canvas>

<nav>
  <h1>Legion</h1>
  <div>
    <a href="https://discord.gg/fvbJNKzQAT" target="_blank">Discord</a>
    <a href="https://raw.githubusercontent.com/Mont015/Websitee/refs/heads/main/GetScript.html">Script</a>
    <a href="file:///C:/Users/Blacksn0w/Desktop/Diiamantii/Legion/Website/GetKeyWeb.html">Get Key</a>
  </div>
</nav>

<section class="hero">
  <div class="card">
    <h2>Get Your Key</h2>
    <p>Choose a provider to generate your key.</p>

    <div class="options">

      <!-- WORKINK -->
      <a href="https://work.ink/YOUR-LINK" target="_blank" class="option">
        <img src="workink.png">
        <span>Work.ink</span>
      </a>

      <!-- LINKVERTISE -->
      <a href="https://linkvertise.com/YOUR-LINK" target="_blank" class="option">
        <img src="linkvertise.png">
        <span>Linkvertise</span>
      </a>

    </div>
  </div>
</section>

<script>
const canvas = document.getElementById("bgCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

class Particle {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 2 + 1;
    this.speedX = (Math.random() - 0.5) * 0.5;
    this.speedY = (Math.random() - 0.5) * 0.5;
  }

  update() {
    this.x += this.speedX;
    this.y += this.speedY;

    if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
    if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
  }

  draw() {
    ctx.fillStyle = "rgba(122,92,255,0.7)";
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

function init() {
  particles = [];
  for (let i = 0; i < 100; i++) {
    particles.push(new Particle());
  }
}

function connect() {
  for (let a = 0; a < particles.length; a++) {
    for (let b = a; b < particles.length; b++) {
      let dx = particles[a].x - particles[b].x;
      let dy = particles[a].y - particles[b].y;
      let dist = dx * dx + dy * dy;

      if (dist < 9000) {
        ctx.strokeStyle = "rgba(0,212,255,0.06)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(particles[a].x, particles[a].y);
        ctx.lineTo(particles[b].x, particles[b].y);
        ctx.stroke();
      }
    }
  }
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let p of particles) {
    p.update();
    p.draw();
  }

  connect();
  requestAnimationFrame(animate);
}

init();
animate();
</script>

</body>
</html>
